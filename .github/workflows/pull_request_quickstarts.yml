name: Quickstarts Workflow

env:
  NODE_OPTIONS: "--max_old_space_size=4096"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, '*.x']
    types:
      - opened
      - reopened
      - synchronize
    paths-ignore:
      - 'LICENSE*'
      - '.gitignore'
      - '**.md'
      - '**.adoc'
      - '*.txt'

jobs:
  java:
    name: "Java Quickstarts"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: downstream-quickstarts-${{ github.event_name }}-${{ github.head_ref }}
      cancel-in-progress: true
    timeout-minutes: 120
    steps:
      # Clone greycos-solver
      # No need to check for stale repo, as Github merges the main repo into the fork automatically.
      - name: Checkout greycos-solver
        uses: actions/checkout@v6
        with:
          path: ./greycos-solver

      # Clone greycos-quickstarts
      # Need to check for stale repo, since Github is not aware of the build chain and therefore doesn't automate it.
      - name: Checkout greycos-quickstarts (PR) # Checkout the PR branch first, if it exists
        if: github.head_ref # Only true if this is a PR.
        id: checkout-quickstarts-pr
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: ${{ github.actor }}/greycos-quickstarts
          ref: ${{ github.head_ref }}
          path: ./greycos-quickstarts
          fetch-depth: 0 # Otherwise merge will fail on account of not having history.
      - name: Checkout greycos-quickstarts (development) # Checkout the development branch if the PR branch does not exist
        if: ${{ steps.checkout-quickstarts-pr.outcome != 'success' }}
        uses: actions/checkout@v6
        with:
          repository: CameleoGrey/greycos-quickstarts
          ref: development
          path: ./greycos-quickstarts
          fetch-depth: 0 # Otherwise merge will fail on account of not having history.

      # Build and test
      - name: Setup Temurin 25 and Maven
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Quickly build greycos-solver
        working-directory: ./greycos-solver
        shell: bash
        run: ./mvnw -B -Dquickly clean install
      - name: Build and test greycos-quickstarts
        working-directory: ./greycos-quickstarts
        shell: bash
        run: mvn -B clean verify
      - name: Test Summary
        uses: test-summary/action@2920bc1b1b377c787227b204af6981e8f41bbef3
        with:
          paths: "**/TEST-*.xml"
          show: "fail"
        if: always()
