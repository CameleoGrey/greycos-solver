type: specs.openrewrite.org/v1beta/recipe
name: ai.greycos.solver.migration.ToLatest
displayName: Upgrade to the latest GreyCOS Solver
description: 'Replace all your calls to deleted/deprecated types and methods of GreyCOS Solver with their proper alternatives.'
recipeList:
  # Solver 1.x
  - ai.greycos.solver.migration.ToLatestV1
  # Solver 2.x
  - ai.greycos.solver.migration.ChangeVersion
  - org.openrewrite.java.DeleteMethodArgument:
      methodPattern: ai.greycos.solver.core.api.score.constraint.ConstraintRef of(String, String)
      argumentIndex: 0
  - org.openrewrite.java.DeleteMethodArgument:
      methodPattern: ai.greycos.solver.core.api.score.stream.ConstraintBuilder asConstraint(String, String)
      argumentIndex: 0
  - org.openrewrite.java.RemoveAnnotationAttribute:
      annotationType: "ai.greycos.solver.core.api.domain.solution.PlanningSolution"
      attributeName: "lookUpStrategyType"
  - org.openrewrite.java.RemoveAnnotationAttribute:
      annotationType: "ai.greycos.solver.core.api.domain.solution.PlanningSolution"
      attributeName: "autoDiscoverMemberType"
  - ai.greycos.solver.migration.v2.GeneralMethodDeleteInvocationMigrationRecipe
  - ai.greycos.solver.migration.v2.GeneralMethodChangeNameMigrationRecipe
  - ai.greycos.solver.migration.v2.GeneralTypeChangeMigrationRecipe
  - ai.greycos.solver.migration.v2.ProblemIdDeletionMigrationRecipe
  - ai.greycos.solver.migration.v2.TestingAPIsMigrationRecipe
  - ai.greycos.solver.migration.v2.GeneralDependencyDeleteMigrationRecipe
  - ai.greycos.solver.migration.v2.GeneralPackageRenameMigrationRecipe
  - org.openrewrite.java.RemoveUnusedImports
