type: specs.openrewrite.org/v1beta/recipe
name: ai.greycos.solver.migration.FromOptaPlannerToGreycosSolver
displayName: Migrate from OptaPlanner to Greycos Solver
description: 'Replaces your method/field calls, GAVs, etc. To replace deprecated methods too, use the recipe ToLatest'
recipeList:
  # Java files
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.optaplanner.persistence.jackson.api.OptaPlannerJacksonModule
      newFullyQualifiedTypeName: ai.greycos.solver.jackson.api.GreycosJacksonModule
      ignoreDefinition: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner.persistence.jackson
      newPackageName: ai.greycos.solver.jackson
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner.persistence.jaxb
      newPackageName: ai.greycos.solver.jaxb
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner.persistence.jsonb
      newPackageName: ai.greycos.solver.jsonb
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner.persistence.xstream
      newPackageName: ai.greycos.solver.xstream
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner.persistence.jpa
      newPackageName: ai.greycos.solver.jpa
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.optaplanner
      newPackageName: ai.greycos.solver
      recursive: true

  # Properties files
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: "^optaplanner\\.(.*)"
      newPropertyKey: "greycos.$1"
      fileMatcher: "**/application*.properties"
      regex: true
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: "^(%[^.]*\\.)?quarkus\\.optaplanner\\.(.*)"
      newPropertyKey: "$1quarkus.greycos.$2"
      fileMatcher: "**/application*.properties"
      regex: true
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: "^(%[^.]*\\.)?quarkus\\.log\\.category\\.\"org\\.optaplanner\"\\.level"
      newPropertyKey: "$1quarkus.log.category.\"ai.greycos.solver\".level"
      fileMatcher: "**/application*.properties"
      regex: true
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: "^(%[^.]*\\.)?logging\\.level\\.org\\.optaplanner"
      newPropertyKey: "$1logging.level.ai.greycos.solver"
      fileMatcher: "**/application*.properties"
      regex: true

  # XML files
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "solver"
      attributeName: "xmlns"
      oldValue: "https://www.optaplanner.org/xsd/solver"
      newValue: "https://greycos.ai/xsd/solver"
      fileMatcher: "**/*.xml"
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "solver"
      attributeName: "xsi:schemaLocation"
      oldValue: "https://www.optaplanner.org/xsd/solver https://www.optaplanner.org/xsd/solver/solver.xsd"
      newValue: "https://greycos.ai/xsd/solver https://greycos.ai/xsd/solver/solver.xsd"
      fileMatcher: "**/*.xml"
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "plannerBenchmark"
      attributeName: "xmlns"
      oldValue: "https://www.optaplanner.org/xsd/benchmark"
      newValue: "https://greycos.ai/xsd/benchmark"
      fileMatcher: "**/*.xml"
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "plannerBenchmark"
      attributeName: "xsi:schemaLocation"
      oldValue: "https://www.optaplanner.org/xsd/benchmark https://www.optaplanner.org/xsd/benchmark/benchmark.xsd"
      newValue: "https://greycos.ai/xsd/benchmark https://greycos.ai/xsd/benchmark/benchmark.xsd"
      fileMatcher: "**/*.xml"
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "logger"
      attributeName: "name"
      oldValue: "org.optaplanner"
      newValue: "ai.greycos.solver"
      fileMatcher: "**/logback.xml"
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: "logger"
      attributeName: "name"
      oldValue: "org.optaplanner"
      newValue: "ai.greycos.solver"
      fileMatcher: "**/logback-test.xml"

  # Maven and Gradle
  - ai.greycos.solver.migration.fork.GreycosChangeDependencies

  # Maven files
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "version.org.optaplanner"
      newKey: "version.ai.greycos.solver"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "version.optaPlanner"
      newKey: "version.greycos"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "version.optaplanner"
      newKey: "version.greycos"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "org.optaplanner.version"
      newKey: "ai.greycos.solver.version"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "optaPlanner.version"
      newKey: "greycos.version"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "optaplanner.version"
      newKey: "greycos.version"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "optaplannerVersion"
      newKey: "greycosVersion"
  - org.openrewrite.maven.RenamePropertyKey:
      oldKey: "optaPlannerVersion"
      newKey: "greycosVersion"
