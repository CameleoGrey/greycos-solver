type: specs.openrewrite.org/v1beta/recipe
name: ai.greycos.solver.migration.ToLatest
displayName: Upgrade to the latest Greycos Solver
description: 'Replace all your calls to deleted/deprecated types and methods of Greycos Solver with their proper alternatives.'
recipeList:
  - ai.greycos.solver.migration.FromOptaPlannerToGreycosSolver
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: greycos.solver.solve-length
      newPropertyKey: greycos.solver.solve.duration
      fileMatcher: '**/application.properties'
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: quarkus.greycos.solver.solve-length
      newPropertyKey: quarkus.greycos.solver.solve.duration
      fileMatcher: '**/application.properties'
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: ai.greycos.solver.core.api.score.stream.ConstraintFactory from(Class)
      newMethodName: forEach
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: ai.greycos.solver.core.api.score.stream.ConstraintFactory fromUnfiltered(Class)
      newMethodName: forEachIncludingUnassigned
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: ai.greycos.solver.core.api.score.stream.ConstraintFactory fromUniquePair(..)
      newMethodName: forEachUniquePair
  - ai.greycos.solver.migration.v8.ScoreManagerMethodsRecipe
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: ai.greycos.solver.core.api.score.ScoreManager
      newFullyQualifiedTypeName: ai.greycos.solver.core.api.solver.SolutionManager
      ignoreDefinition: true
  - ai.greycos.solver.migration.v8.ScoreGettersRecipe
  - ai.greycos.solver.migration.v8.ConstraintRefRecipe
  - ai.greycos.solver.migration.v8.SolverManagerBuilderRecipe
  - ai.greycos.solver.migration.v8.NullableRecipe
  - ai.greycos.solver.migration.v8.SingleConstraintAssertionMethodsRecipe
  - ai.greycos.solver.migration.v8.AsConstraintRecipe
  - ai.greycos.solver.migration.v8.RemoveConstraintPackageRecipe
  - ai.greycos.solver.migration.v8.SolutionManagerRecommendAssignmentRecipe
  - ai.greycos.solver.migration.v8.SortingMigrationRecipe
  - org.openrewrite.java.RemoveUnusedImports
  - ai.greycos.solver.migration.ChangeVersion
